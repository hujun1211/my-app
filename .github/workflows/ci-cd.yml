name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== CI：代码检查 + 构建 ==========
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. Lint 检查
      - name: Run lint
        run: npm run lint

      # 5. 构建项目
      - name: Build project
        run: npm run build

      # 6. 上传构建产物（供下一个 job 使用）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ========== CD：部署到 GitHub Pages ==========
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build                    # 必须 build 成功才执行
    if: github.ref == 'refs/heads/main'  # 只有 push 到 main 才部署

    permissions:
      contents: write

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 下载构建产物
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # 3. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
